name: Publish Features

on:
  push:
    branches: [main]
    paths:
      - 'src/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Publish Features
        uses: devcontainers/action@v1
        with:
          publish-features: true
          base-path-to-features: './src'
          oci-registry: ghcr.io
          generate-docs: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
